    <meta name="twitter:description" content="AI agents and automation that take repeating work off your team — support, follow-ups, operations." />

    <link rel="canonical" href="https://grenwall.org/" />
    <title>Grenwall</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://grenwall.org/#organization",
            "name": "Grenwall",
            "url": "https://grenwall.org/",
            "logo": "https://grenwall.org/og-image.jpg",
            "description": "Grenwall designs and builds AI agents, workflow automations and AI-native products for ambitious teams.",
            "sameAs": ["https://www.linkedin.com/company/grenwall"],
            "areaServed": "Worldwide",
            "knowsAbout": [
              "AI agents",
              "Workflow automation",
              "Custom AI products"
            ],
            "address": {
              "@type": "PostalAddress",
              "addressCountry": "IN"
            },
            "contactPoint": {
              "@type": "ContactPoint",
              "email": "hello@grenwall.org",
              "contactType": "sales",
              "availableLanguage": "English"
            }
          },
          {
            "@type": "WebSite",
            "@id": "https://grenwall.org/#website",
            "url": "https://grenwall.org/",
            "name": "Grenwall",
            "publisher": { "@id": "https://grenwall.org/#organization" }
          },
          {
            "@type": "ProfessionalService",
            "name": "Grenwall AI Systems",
            "image": "https://grenwall.org/og-image.jpg",
            "url": "https://grenwall.org/",
            "parentOrganization": { "@id": "https://grenwall.org/#organization" },
            "areaServed": "Worldwide",
            "hasOfferCatalog": {
              "@type": "OfferCatalog",
              "name": "Services",
              "itemListElement": [
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "AI Agents",
                    "description": "Support, sales, and ops handoffs that run without waiting on a person."
                  }
                },
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Workflow Automation",
                    "description": "End-to-end flows across the tools you already use."
                  }
                },
                {
                  "@type": "Offer",
                  "itemOffered": {
                    "@type": "Service",
                    "name": "Custom AI Products",
                    "description": "Software with intelligence at the core, shipped to production."
                  }
                }
              ]
            }
          }
        ]
      }
    </script>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
